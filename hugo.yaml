baseURL: https://tekulabo-fx.com/
languageCode: ja
defaultContentLanguage: ja
title: "テクラボFX"
theme: PaperMod
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "テクラボFX"
  description: "FXトレードの技術と戦略を体系的に解説するブログ"
  keywords:
    - FX
    - 為替
    - トレード
    - テクニカル分析
    - 自動売買
  author: "テクラボFX"
  DateFormat: "2006年1月2日"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true
    favicon: /favicon-512x512.png
    favicon16x16: /favicon-16x16.png
    favicon32x32: /favicon-32x32.png
    apple_touch_icon: /apple-touch-icon.png

  homeInfoParams:
    Title: "テクラボFX"
    Content: >
      FXトレードの技術と戦略を体系的に解説するブログです。
      テクニカル分析、自動売買、リスク管理など、実践的な情報を発信しています。

  socialIcons:
    - name: x
      url: "https://x.com/hayate_tekulabo"

  images:
    - /ogp-default.png

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: home
      name: "ホーム"
      url: /
      weight: 1
    - identifier: categories
      name: "カテゴリ"
      url: /categories/
      weight: 2
    - identifier: tags
      name: "タグ"
      url: /tags/
      weight: 3
    - identifier: search
      name: "検索"
      url: /search/
      weight: 4
    - identifier: about
      name: "About"
      url: /about/
      weight: 5

markup:
  goldmark:
    renderer:
      unsafe: false
  highlight:
    noClasses: false
